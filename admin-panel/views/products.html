<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta http-equiv="Cache-Control" content="no-store" />
  <title>Admin Products – Lavitúr</title>
  <link rel="stylesheet" href="../css/product.css">
  <link rel="stylesheet" href="../css/productmodal.css">
  <script src="../js/config.js"></script>
</head>

<body>
  <header>
    <h1>Product Management</h1>
    <div class="mode-toggle">
      <label for="modeSwitch">Editorial Mode</label>
      <input type="checkbox" id="modeSwitch" disabled />
    </div>
  </header>

  <main>
    
    <!-- Viewer Mode -->
    <section id="viewerModeSection">
      <table>
        <thead>
          <tr>
            <th>Name</th>
            <th>Price</th>
            <th>Stock</th>
            <th>Status</th>
            <th>Category</th>
            <th>Actions</th>
          </tr>
        </thead>
        <tbody id="viewerTableBody">
          <!-- JS renders product rows here -->
        </tbody>
      </table>
    </section>


    <!-- Editorial Mode -->
    <section id="editorialModeSection" class="hidden">
      <div class="editorial-header">
        <h2>Editorial View</h2>
        <button id="addGeneralProductBtn">+ Add Product</button>
      </div>

      <div id="categoryContainer">
        <!-- JS generates category blocks here -->
      </div>
    </section>
  </main>

  <!-- Product Form Modal (keep OUTSIDE categoryContainer) -->
  <div id="productFormModal" class="pmodal hidden">
  <div class="pmodal__overlay" id="productModalOverlay"></div>

  <div class="pmodal__dialog" role="dialog" aria-modal="true" aria-labelledby="productFormTitle">
    <div class="pmodal__header">
      <h2 id="productFormTitle">Add Product</h2>
      <button type="button" class="pmodal__iconbtn" id="cancelProductFormBtn" aria-label="Close">
        ✕
      </button>
    </div>

    <div class="pmodal__body">
      <!-- LEFT: FORM -->
      <form id="productForm" class="pmodal__left">
        <div class="pfield">
          <label for="title">Name</label>
          <input id="title" name="title" type="text" placeholder="Product name" />
        </div>

        <div class="pfield">
          <label for="description">Description</label>
          <textarea id="description" name="description" rows="5" placeholder="Short product description"></textarea>
        </div>

        <div class="pgrid2">
          <div class="pfield">
            <label for="price">Price (JMD)</label>
            <input id="price" name="price" type="number" min="0" step="0.01" placeholder="0.00" />
          </div>

          <div class="pfield">
            <label for="stock">Stock</label>
            <input id="stock" name="stock" type="number" min="0" step="1" placeholder="0" />
          </div>
        </div>

        <div class="pfield">
          <label for="productCategorySelect">Category</label>
          <select id="productCategorySelect" name="categoryName"></select>
        </div>

        <div class="pmodal__footer">
          <button type="button" class="pbtn pbtn--ghost" id="cancelProductFormBtnBottom">Cancel</button>
          <button type="submit" class="pbtn pbtn--primary">Save</button>
        </div>
      </form>

      <!-- RIGHT: MEDIA -->
      <aside class="pmodal__right">
        <div class="pmedia">
          <div class="pmedia__header">
            <div>
              <div class="pmedia__title">Product Media</div>
              <div class="pmedia__sub">Upload images/videos for this product.</div>
            </div>
          </div>

          <!-- Upload box -->
          <label class="pupload">
            <input id="productMediaInput" type="file" accept="image/*,video/mp4" multiple />
            <div class="pupload__box">
              <div class="pupload__icon">⬆</div>
              <div class="pupload__text">
                <div class="pupload__headline">Drop files here or click to upload</div>
                <div class="pupload__meta">PNG, JPG, MP4</div>
              </div>
            </div>
          </label>

          <!-- Preview grid -->
          <div id="productMediaGrid" class="media-grid"></div>
        </div>
      </aside>
    </div>
  </div>
</div>


  <!-- Page logic -->
  <script type="module" src="../js/products.js"></script>
</body>
</html>
