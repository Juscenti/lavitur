<!-- admin-panel/login.html -->
<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <base href="/admin-panel/" />
  <title>Lavitúr Admin Login</title>
  <link rel="stylesheet" href="css/login.css" />
</head>
<body>
  <main class="login-container">
    <form id="loginForm" class="login-form" novalidate>
      <h1>Admin Login</h1>

      <div class="form-group">
        <label for="username">Email</label>
        <input type="email" id="username" name="username" required autocomplete="email" placeholder="e.g. kuaneforrest@gmail.com" />
        <small style="display:block;margin-top:4px;color:#666;">Use the email for your admin account (not username).</small>
      </div>

      <div class="form-group">
        <label for="password">Password</label>
        <input type="password" id="password" name="password" required autocomplete="current-password" />
      </div>

      <button type="submit">Log In</button>
      <p class="error-message" id="errorMsg"></p>
    </form>
  </main>

  <!-- Single entrypoint: login.js handles session check + login -->
  <script type="module" src="./js/login.js"></script>
</body>
</html>
