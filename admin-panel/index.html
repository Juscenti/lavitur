<!-- admin-panel/index.html -->
<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Lavitúr Admin Dashboard</title>
  <link rel="stylesheet" href="css/admin.css" />
  <meta http-equiv="Cache-Control" content="no-store" />
</head>
<body>

  <div id="admin-container">
    <!-- Sidebar -->
    <aside id="sidebar"></aside>

    <!-- Main Content Area -->
    <main id="main">
      <header id="topbar"></header>

      <section id="dashboard-content">
        <h1>Welcome, Admin</h1>

        <div class="cards-grid">
          <div class="card">
            <h2>Total Sales</h2>
            <p id="sales-total">JMD 0.00</p>
          </div>
          <div class="card">
            <h2>Orders</h2>
            <p id="orders-today">0</p>
          </div>
          <div class="card">
            <h2>New Users</h2>
            <p id="new-users">—</p>
          </div>
          <div class="card">
            <h2>Open Tickets</h2>
            <p id="open-tickets">—</p>
          </div>
        </div>

        <div class="chart-section">
          <canvas id="salesChart"></canvas>
        </div>
      </section>
    </main>
  </div>

  <!-- Single entrypoint: dashboard logic handles auth gate + component injection -->
  <script type="module" src="./js/dashboard.js"></script>
</body>
</html>
