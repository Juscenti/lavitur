<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Product – Lavitúr</title>
  <script src="js/base.js"></script>
  <link
    href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700&family=Urbanist:wght@400;700&display=swap"
    rel="stylesheet"
  />
  <link
    rel="stylesheet"
    href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css"
    crossorigin="anonymous"
    referrerpolicy="no-referrer"
  />
  <link rel="stylesheet" href="css/styles.css" />
  <link rel="stylesheet" href="css/shop.css" />
  <script src="js/config.js"></script>
  <script src="js/product.js"></script>
</head>
<body class="product-page">
  <header class="shop-topbar">
    <a href="/Frontend/" class="shop-topbar-home">Lavitúr</a>
    <nav class="shop-topbar-links">
      <a href="/Frontend/">Home</a>
      <a href="shop.html">Shop</a>
      <a href="cart.html" class="shop-topbar-cart" aria-label="Cart"><i class="fas fa-shopping-bag"></i></a>
      <a href="wishlist.html" class="shop-topbar-wishlist" aria-label="Wishlist"><i class="fas fa-heart"></i></a>
    </nav>
  </header>

  <main class="pdp" id="pdp-main">
    <div class="pdp-loading" id="pdp-loading">Loading…</div>
    <div class="pdp-error" id="pdp-error" hidden>
      <p>Product not found.</p>
      <a href="shop.html" class="pdp-back">Back to shop</a>
    </div>
    <article class="pdp-content" id="pdp-content" hidden>
      <div class="pdp-gallery-wrap">
        <div class="pdp-gallery">
          <img id="pdp-image" src="" alt="" />
        </div>
        <div class="pdp-gallery-thumbs" id="pdp-gallery-thumbs" hidden></div>
      </div>
      <div class="pdp-info">
        <a href="shop.html" class="pdp-category" id="pdp-category" hidden></a>
        <h1 id="pdp-title"></h1>
        <p class="pdp-price" id="pdp-price"></p>
        <p class="pdp-desc" id="pdp-desc"></p>
        <p class="pdp-stock" id="pdp-stock"></p>

        <div class="pdp-option pdp-size-wrap">
          <label class="pdp-option-label">Size</label>
          <div class="pdp-size-options" id="pdp-size-options"></div>
          <p class="pdp-size-hint" id="pdp-size-hint"></p>
        </div>

        <div class="pdp-option pdp-quantity-wrap">
          <label class="pdp-option-label">Quantity</label>
          <div class="pdp-quantity">
            <button type="button" class="pdp-qty-btn" id="pdp-qty-minus" aria-label="Decrease">−</button>
            <input type="number" id="pdp-quantity" value="1" min="1" max="99" aria-label="Quantity" />
            <button type="button" class="pdp-qty-btn" id="pdp-qty-plus" aria-label="Increase">+</button>
          </div>
        </div>

        <div class="pdp-actions">
          <button type="button" class="pdp-add-cart" id="pdp-add-cart">Add to cart</button>
          <button type="button" class="pdp-wishlist" id="pdp-wishlist" aria-label="Add to wishlist"><i class="far fa-heart"></i></button>
        </div>
        <a href="shop.html" class="pdp-btn-back">← Back to shop</a>
      </div>
    </article>

    <!-- Reviews section (full width below product) -->
    <section class="pdp-reviews" id="pdp-reviews" hidden>
      <div class="pdp-reviews-header">
        <h2 class="pdp-reviews-title">Reviews</h2>
        <p class="pdp-reviews-summary" id="pdp-reviews-summary" aria-live="polite"></p>
      </div>
      <div class="pdp-reviews-list" id="pdp-reviews-list"></div>
      <form class="pdp-review-form" id="pdp-review-form">
        <h3>Write a review</h3>
        <div class="pdp-review-field">
          <label for="pdp-review-name">Name</label>
          <input type="text" id="pdp-review-name" required maxlength="100" placeholder="Your name" />
        </div>
        <div class="pdp-review-field">
          <label>Rating</label>
          <div class="pdp-review-stars" id="pdp-review-stars">
            <button type="button" class="pdp-star" data-rating="1" aria-label="1 star"><i class="far fa-star"></i></button>
            <button type="button" class="pdp-star" data-rating="2" aria-label="2 stars"><i class="far fa-star"></i></button>
            <button type="button" class="pdp-star" data-rating="3" aria-label="3 stars"><i class="far fa-star"></i></button>
            <button type="button" class="pdp-star" data-rating="4" aria-label="4 stars"><i class="far fa-star"></i></button>
            <button type="button" class="pdp-star" data-rating="5" aria-label="5 stars"><i class="far fa-star"></i></button>
          </div>
          <p class="pdp-review-rating-hint" id="pdp-review-rating-hint" hidden>Please select a rating.</p>
        </div>
        <div class="pdp-review-field">
          <label for="pdp-review-comment">Comment</label>
          <textarea id="pdp-review-comment" rows="4" maxlength="1000" placeholder="Share your thoughts…" required></textarea>
        </div>
        <button type="submit" class="pdp-review-submit">Submit review</button>
      </form>
    </section>
  </main>

  <footer class="footer">
    <p>&copy; 2025 Lavitúr. All rights reserved.</p>
  </footer>
</body>
</html>
