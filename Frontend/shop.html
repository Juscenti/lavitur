<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Shop – Lavitúr</title>
  <script src="js/base.js"></script>
  <link
    href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700&family=Urbanist:wght@400;700&display=swap"
    rel="stylesheet"
  />
  <link
    rel="stylesheet"
    href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css"
    crossorigin="anonymous"
    referrerpolicy="no-referrer"
  />
  <link rel="stylesheet" href="css/styles.css" />
  <link rel="stylesheet" href="css/shop.css" />
  <script src="js/config.js"></script>
  <script type="module" src="js/shop.js"></script>
</head>
<body class="shop-page">
  <!-- Shop top bar: minimal, no full navbar -->
  <header class="shop-topbar">
    <a href="/Frontend/" class="shop-topbar-home">Lavitúr</a>
    <nav class="shop-topbar-links">
      <a href="/Frontend/">Home</a>
      <a href="cart.html" class="shop-topbar-cart" aria-label="Cart"><i class="fas fa-shopping-bag"></i></a>
      <a href="wishlist.html" class="shop-topbar-wishlist" aria-label="Wishlist"><i class="fas fa-heart"></i></a>
    </nav>
  </header>

  <div class="shop-layout">
    <!-- Toolbar: search, sort, filter toggle (mobile) -->
    <header class="shop-toolbar">
      <div class="shop-toolbar-inner">
        <div class="search-wrap">
          <i class="fas fa-search"></i>
          <input type="search" id="shop-search" class="shop-search" placeholder="Search products…" autocomplete="off" />
        </div>
        <div class="toolbar-right">
          <select id="shop-sort" class="shop-sort" aria-label="Sort by">
            <option value="newest">Newest</option>
            <option value="price_asc">Price: low → high</option>
            <option value="price_desc">Price: high → low</option>
          </select>
          <button type="button" class="filters-toggle" id="filters-toggle" aria-label="Open filters">
            <i class="fas fa-sliders-h"></i> Filters
          </button>
        </div>
      </div>
    </header>

    <div class="filters-drawer-backdrop" id="filters-backdrop" aria-hidden="true"></div>
    <!-- Fixed left sidebar with collapsible sections -->
    <aside class="filters-sidebar" id="filters-sidebar">
      <div class="filters-header">
        <h2>Filters</h2>
        <button type="button" class="filters-close" id="filters-close" aria-label="Close filters"><i class="fas fa-times"></i></button>
      </div>

      <div class="filter-collapse" data-collapse="main-cat">
        <button type="button" class="filter-collapse-trigger" aria-expanded="true" aria-controls="filter-main-cat-content" id="filter-main-cat-trigger">
          <span>Main category</span>
          <i class="filter-collapse-chevron fas fa-chevron-down" aria-hidden="true"></i>
        </button>
        <div class="filter-collapse-content" id="filter-main-cat-content">
          <div class="filter-checkboxes" id="filter-main-cat-list"></div>
        </div>
      </div>

      <div class="filter-collapse" data-collapse="sub-cat">
        <button type="button" class="filter-collapse-trigger" aria-expanded="true" aria-controls="filter-sub-cat-content" id="filter-sub-cat-trigger">
          <span>Sub-Cats</span>
          <i class="filter-collapse-chevron fas fa-chevron-down" aria-hidden="true"></i>
        </button>
        <div class="filter-collapse-content" id="filter-sub-cat-content">
          <div class="filter-checkboxes filter-subcats-list" id="filter-sub-cat-list"></div>
        </div>
      </div>

      <div class="filter-collapse" data-collapse="size">
        <button type="button" class="filter-collapse-trigger" aria-expanded="true" aria-controls="filter-size-content" id="filter-size-trigger">
          <span>Size</span>
          <i class="filter-collapse-chevron fas fa-chevron-down" aria-hidden="true"></i>
        </button>
        <div class="filter-collapse-content" id="filter-size-content">
          <select id="filter-size" class="filter-select">
            <option value="">Any</option>
            <option value="XS">XS</option>
            <option value="S">S</option>
            <option value="M">M</option>
            <option value="L">L</option>
            <option value="XL">XL</option>
          </select>
        </div>
      </div>

      <div class="filter-group">
        <h3>Price range</h3>
        <div class="price-range">
          <input type="number" id="filter-price-min" class="filter-input" placeholder="Min" min="0" step="1" />
          <span>–</span>
          <input type="number" id="filter-price-max" class="filter-input" placeholder="Max" min="0" step="1" />
        </div>
      </div>
      <div class="filter-group">
        <label class="filter-checkbox-label">
          <input type="checkbox" id="filter-in-stock" />
          <span>In stock only</span>
        </label>
      </div>
      <button type="button" class="clear-filters" id="clear-filters">Clear filters</button>
    </aside>

    <!-- Main: grid + load more + empty state -->
    <main class="shop-main">
      <div class="product-grid" id="product-grid" role="list"></div>
      <div class="load-more-wrap" id="load-more-wrap" hidden>
        <button type="button" class="load-more-btn" id="load-more-btn">Load more</button>
      </div>
      <div class="shop-empty" id="shop-empty" hidden>
        <p>No results</p>
        <p class="shop-empty-hint">Try adjusting or clearing your filters.</p>
        <button type="button" class="clear-filters-inline" id="clear-filters-inline">Clear filters</button>
      </div>
      <div class="shop-error" id="shop-error" hidden>
        <p>Something went wrong loading products.</p>
        <button type="button" class="retry-btn" id="retry-btn">Try again</button>
      </div>
    </main>
  </div>

  <!-- Quick View modal -->
  <div class="quick-view-overlay" id="quick-view-overlay" hidden>
    <div class="quick-view-modal" id="quick-view-modal" role="dialog" aria-modal="true" aria-labelledby="quick-view-title">
      <button type="button" class="quick-view-close" id="quick-view-close" aria-label="Close"><i class="fas fa-times"></i></button>
      <div class="quick-view-content">
        <div class="quick-view-image-wrap">
          <img id="quick-view-img" src="" alt="" loading="lazy" />
        </div>
        <div class="quick-view-details">
          <h2 id="quick-view-title"></h2>
          <p class="quick-view-price" id="quick-view-price"></p>
          <p class="quick-view-desc" id="quick-view-desc"></p>
          <div class="quick-view-actions">
            <a id="quick-view-pdp" class="btn-view-details" href="#">View details</a>
            <button type="button" class="quick-view-wishlist" id="quick-view-wishlist" aria-label="Add to wishlist"><i class="far fa-heart"></i></button>
          </div>
        </div>
      </div>
    </div>
  </div>

  <footer class="footer">
    <p>&copy; 2025 Lavitúr. All rights reserved.</p>
  </footer>
</body>
</html>
